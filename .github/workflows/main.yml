name: Demo Automation Pipeline
 
on:
  push:
    branches: [ main ]
 
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment"
        type: "choice"
        required: true
        default: "qa"
        options:
        - "qa"
        - "Dev"
        - "Stage"
 
  schedule:
    - cron: '*/1 * * * *'
 
jobs:
  test:
    runs-on: ubuntu-latest
 
    env:
      ENVIRONMENT: ${{ github.event.inputs.environment }}
 
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3
 
      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
 
      # - name: Install Dependencies
      #   run: pip install -r requirements.txt
 
      - name: Run Tests
        run: python src/main.py
 
      - name: Use Secret Example
        run: echo "Secret loaded"
        env:
          PASSWORD: ${{ secrets.Rep_Secret }}
